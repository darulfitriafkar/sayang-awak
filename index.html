<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Untuk Aisyah 🤍</title>

<style>
body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial;
background: linear-gradient(135deg,#ff758c,#ff7eb3); /* pink gradient */
color:white;
text-align:center;
}

h1{
margin-top:80px;
font-size:36px;
position:relative;
z-index:2;
}

.love{
font-size:26px;
animation:fade 2s infinite alternate;
position:relative;
z-index:2;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
position:relative;
z-index:2;
}

button:hover{
background:#ff1e4d;
}

.heart{
position:absolute;
color:#ff4d6d;
animation:fall linear infinite;
font-size:20px;
user-select:none;
pointer-events:none;
z-index:1;
}

@keyframes fall{
0%{
  transform: translateY(-50px); /* start dari atas page */
}
100%{
  transform: translateY(110vh); /* jatuh sampai bawah */
}
}

@keyframes fade{
from{opacity:0.4;}
to{opacity:1;}
}
</style>

</head>
<body>

<h1>Untuk Aisyah 🤍</h1>

<div class="love" id="loveText">
<p>Saya sayang awak, Aisyah 🤍</p>
</div>

<button onclick="maaf()">Maafkan saya Aisyah 🥺</button>
<br>
<button onclick="playMusic()">Play Music ❤️</button>

<audio id="music">
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function maaf(){
alert("Maafkan saya ya Aisyah. Saya betul-betul sayang awak 🤍");
}

function playMusic(){
document.getElementById("music").play();
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    
    // Hati muncul di random horizontal position
    heart.style.left = Math.random()*100 + "vw";
    
    // Saiz random
    heart.style.fontSize = (15 + Math.random()*25) + "px";
    
    // Durasi jatuh random supaya kelihatan natural
    const duration = 3 + Math.random()*5;
    heart.style.animationDuration = duration + "s";
    
    document.body.appendChild(heart);
    
    // Buang hati selepas animation selesai
    setTimeout(()=>{
        heart.remove();
    }, duration*1000);
}

// Buat hati muncul setiap 200ms
setInterval(createHeart, 200);

// Tambah banyak teks "Saya sayang awak, Aisyah 🤍"
const loveDiv = document.getElementById("loveText");
for(let i=0; i<80; i++){
    const p = document.createElement("p");
    p.textContent = "Saya sayang awak, Aisyah 🤍";
    loveDiv.appendChild(p);
}
</script>

</body>
</html>
